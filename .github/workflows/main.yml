name: CI

# Build on push to master and deploy to the GitHub Pages repo.
on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install and build
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          npm i
          npm run build

      - name: Deploy to huntertran.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Personal access token with push rights to the target repo.
          # Add it under Settings > Secrets and variables > Actions as DEPLOY_TOKEN.
          personal_token: ${{ secrets.GITHUBIO_DEPLOY }}
          external_repository: huntertran/huntertran.github.io
          publish_branch: master
          publish_dir: ./build
          # Wipe the target branch each deploy so removed files don't linger.
          force_orphan: true
